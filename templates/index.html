<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisper Transcribe</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="noise-overlay"></div>

    <div class="container">
        <header class="app-header">
            <div class="logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
                    <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                    <line x1="12" y1="19" x2="12" y2="22"/>
                    <line x1="8" y1="22" x2="16" y2="22"/>
                </svg>
                <span>Whisper</span>
            </div>
            <p class="subtitle">Sprache zu Text, powered by AI</p>
        </header>

        <main class="main-card">
            <!-- Upload / Aufnahme Bereich -->
            <div class="upload-section" id="uploadSection">
                <div class="record-area">
                    <button class="record-btn" id="recordBtn" aria-label="Aufnahme starten">
                        <div class="record-btn-inner">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
                                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                            </svg>
                        </div>
                        <span class="record-label">Aufnehmen</span>
                    </button>

                    <div class="recording-indicator" id="recordingIndicator">
                        <div class="recording-pulse"></div>
                        <span class="recording-time" id="recordingTime">00:00</span>
                        <span class="recording-text">Aufnahme läuft...</span>
                    </div>
                </div>

                <div class="divider">
                    <span>oder</span>
                </div>

                <div class="drop-zone" id="dropZone">
                    <input type="file" id="fileInput" accept="audio/*" hidden>
                    <div class="drop-zone-content">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                        <p class="drop-text">Audio-Datei hier ablegen</p>
                        <p class="drop-hint">oder klicken zum Durchsuchen</p>
                        <p class="drop-formats">MP3, WAV, M4A, WEBM, OGG</p>
                    </div>
                </div>
            </div>

            <!-- Lade-Animation -->
            <div class="loading-section" id="loadingSection" style="display:none;">
                <div class="spinner-container">
                    <div class="spinner"></div>
                    <div class="spinner-inner"></div>
                </div>
                <p class="loading-text">Transkribiere...</p>
                <p class="loading-sub">KI analysiert dein Sprachmemo</p>
            </div>

            <!-- Ergebnis-Bereich -->
            <div class="result-section" id="resultSection" style="display:none;">
                <div class="result-header">
                    <span class="result-badge">Transkription</span>
                    <div class="result-actions">
                        <button class="icon-btn" id="newTranscriptionBtn" title="Neue Transkription">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="1 4 1 10 7 10"/>
                                <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
                            </svg>
                        </button>
                        <button class="icon-btn" id="copyBtn" title="Kopieren">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="text-output" id="textOutput"></div>
                <div class="copy-feedback" id="copyFeedback">Kopiert!</div>
            </div>
        </main>

        <footer class="app-footer">
            <p>Powered by OpenAI Whisper · Local & Private</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
